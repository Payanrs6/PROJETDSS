<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImmOran | Immobilier de Prestige</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ImmOran - Modern Real Estate Design System */
        :root {
            --bg-dark: #0A0A0B;
            --bg-card: #141417;
            --primary: #FF3B3F;
            --primary-hover: #D32F2F;
            --text-main: #FFFFFF;
            --text-muted: #9A9A9A;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-main: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ── Typography ── */
        h1, h2, h3 {
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .glass {
            background: rgba(20, 20, 23, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        /* ── HEADER ── */
        header {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            transition: var(--transition);
        }

        header.scrolled {
            background: rgba(10, 10, 11, 0.95);
            height: 70px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--primary);
        }

        /* ── HERO ── */
        .hero {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 100px 5% 50px;
            background: radial-gradient(circle at 80% 20%, rgba(255, 59, 63, 0.15), transparent 50%);
            position: relative;
        }

        .hero-content {
            max-width: 900px;
        }

        .hero h1 {
            font-size: clamp(3.5rem, 12vw, 7rem);
            line-height: 0.9;
            margin-bottom: 1.5rem;
            font-family: 'Syne', sans-serif;
            text-transform: uppercase;
            font-weight: 800;
        }

        .hero h1 span {
            color: var(--primary);
            position: relative;
            display: inline-block;
        }

        .hero h1 span::after {
            content: '';
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            height: 8px;
            background: var(--primary);
            opacity: 0.3;
            z-index: -1;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 550px;
            border-left: 3px solid var(--primary);
            padding-left: 20px;
        }

        /* ── FILTERS ── */
        .filters-section {
            padding: 0 5%;
            margin-top: -40px;
            position: relative;
            z-index: 100;
        }

        .search-bar {
            display: flex;
            gap: 1rem;
            padding: 1.8rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
            background: #1A1A1D; /* Fallback for transparency */
        }

        .search-field {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-field i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            z-index: 5;
        }

        .search-field input, .search-field select {
            width: 100%;
            background: #252529 !important;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1.1rem 1.5rem 1.1rem 3.2rem;
            border-radius: 14px;
            color: #FFFFFF !important; /* Forces white text */
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
            appearance: none;
        }

        .search-field input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .search-field input:focus, .search-field select:focus {
            border-color: var(--primary);
            background: #2D2D32 !important;
        }

        .btn-search {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 3rem;
            border-radius: 14px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-search:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
        }

        /* ── GRID ── */
        .properties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2.5rem;
            padding: 6rem 5%;
        }

        .property-card {
            background: var(--bg-card);
            border-radius: 28px;
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.8s ease both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .property-card:hover {
            transform: translateY(-12px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(255, 59, 63, 0.1);
        }

        .card-img-box {
            height: 280px;
            position: relative;
            overflow: hidden;
        }

        .card-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .property-card:hover .card-img-box img {
            transform: scale(1.1);
        }

        .card-badge {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: var(--primary);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 2;
        }

        .card-content {
            padding: 2rem;
        }

        .card-type {
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
            letter-spacing: 1px;
        }

        .card-title {
            font-size: 1.6rem;
            margin-bottom: 1.2rem;
            line-height: 1.2;
            color: white;
        }

        .card-specs {
            display: flex;
            gap: 1.8rem;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .card-specs span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-specs i {
            color: var(--primary);
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 1.8rem;
        }

        .card-price {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
        }

        .card-price span {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-left: 4px;
        }

        .btn-details {
            background: transparent;
            color: white;
            border: 1px solid var(--primary);
            padding: 0.7rem 1.4rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-details:hover {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.97);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-container {
            width: 100%;
            max-width: 1100px;
            background: #111113;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-modal {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: var(--primary);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* ── FOOTER ── */
        footer {
            padding: 6rem 5% 4rem;
            text-align: center;
            background: #050505;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .footer-credits {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 2;
        }

        .footer-credits strong {
            color: var(--text-main);
            display: block;
            margin-top: 1rem;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        @media (max-width: 900px) {
            .hero h1 { font-size: 4rem; }
            .search-bar { gap: 0.8rem; }
            .btn-search { width: 100%; padding: 1rem; }
        }
    </style>
</head>
<body>

    <header id="mainHeader">
        <a href="#" class="logo">Imm<span>Oran</span></a>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Imm<span>Oran</span></h1>
            <p>Découvrez notre collection exclusive de 8 propriétés d'exception à Oran. Luxe, modernité et confort absolu.</p>
        </div>
    </section>

    <section class="filters-section">
        <div class="search-bar glass">
            <div class="search-field">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Rechercher par titre, ville..." oninput="handleFilterChange()">
            </div>
            <div class="search-field">
                <i class="fas fa-home"></i>
                <select id="typeFilter" onchange="handleFilterChange()">
                    <option value="">Tous les types</option>
                    <option value="appartement">Appartement</option>
                    <option value="villa">Villa</option>
                    <option value="studio">Studio</option>
                    <option value="duplex">Duplex</option>
                    <option value="maison">Maison</option>
                    <option value="local commercial">Local commercial</option>
                    <option value="bureau">Bureau</option>
                </select>
            </div>
            <div class="search-field">
                <i class="fas fa-tag"></i>
                <select id="statusFilter" onchange="handleFilterChange()">
                    <option value="">Tous les statuts</option>
                    <option value="à vendre">À vendre</option>
                    <option value="à louer">À louer</option>
                    <option value="vendu">Vendu</option>
                    <option value="loué">Loué</option>
                </select>
            </div>
            <button class="btn-search">Filtrer</button>
        </div>
    </section>

    <main class="properties-grid" id="propertiesGrid">
        <!-- Cards injected by JS -->
    </main>

    <footer>
        <p class="footer-credits">
            © 2026 ImmOran. Excellence Immobilière.
            <br>
            <strong>OULD ALI MOHAND AREZKI RAYANE & HAMADACHE ALI L3 G6 ISIL</strong>
        </p>
    </footer>

    <div class="modal-overlay" id="propertyModal">
        <div class="modal-container">
            <button class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let BIENS_DATA = [];

        async function initApp() {
            try {
                const response = await fetch('biens.json');
                if (!response.ok) throw new Error('Erreur lors du chargement des données');
                
                BIENS_DATA = await response.json();
                renderProperties(BIENS_DATA);
            } catch (error) {
                console.error('Fetch Error:', error);
                const grid = document.getElementById('propertiesGrid');
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--primary);">Erreur de chargement des données. Veuillez utiliser un serveur local (ex: Live Server).</p>`;
            }
        }

        function renderProperties(data) {
            const grid = document.getElementById('propertiesGrid');
            if (data.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted);">Aucun bien trouvé.</p>';
                return;
            }
            grid.innerHTML = data.map((prop, index) => `
                <div class="property-card" style="animation-delay: ${index * 0.1}s">
                    <div class="card-img-box">
                        <img src="${prop.image}" alt="${prop.titre}" onerror="this.src='https://via.placeholder.com/800x600?text=Image+Non+Disponible'">
                        <div class="card-badge">${prop.statut}</div>
                    </div>
                    <div class="card-content">
                        <div class="card-type">${prop.type}</div>
                        <h3 class="card-title">${prop.titre}</h3>
                        <div class="card-specs">
                            <span><i class="fas fa-expand"></i> ${prop.surface} m²</span>
                            <span><i class="fas fa-door-open"></i> ${prop.nombre_pieces} p.</span>
                        </div>
                        <div class="card-footer">
                            <div class="card-price">${prop.prix.toLocaleString()} <span>DZD${prop.statut.includes('louer') ? '/m' : ''}</span></div>
                            <button class="btn-details" onclick="openModal('${prop.id}')">Détails</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function handleFilterChange() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const type = document.getElementById('typeFilter').value;
            const status = document.getElementById('statusFilter').value;

            const filtered = BIENS_DATA.filter(p => {
                const text = (p.titre + p.adresse.ville + p.type).toLowerCase();
                const matchesSearch = text.includes(query);
                const matchesType = !type || p.type === type;
                const matchesStatus = !status || p.statut === status;
                return matchesSearch && matchesType && matchesStatus;
            });

            renderProperties(filtered);
        }

        function openModal(id) {
            const prop = BIENS_DATA.find(p => p.id === id);
            const modalBody = document.getElementById('modalBody');
            const overlay = document.getElementById('propertyModal');

            modalBody.innerHTML = `
                <div style="display: flex; flex-wrap: wrap; height: 100%;">
                    <div style="flex: 1.2; min-width: 400px; height: auto;">
                        <img src="${prop.image}" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='https://via.placeholder.com/800x600'">
                    </div>
                    <div style="flex: 1; min-width: 350px; padding: 3rem; display: flex; flex-direction: column;">
                        <div class="card-type">${prop.type}</div>
                        <h2 style="font-size: 2.5rem; margin-bottom: 1.5rem; font-family: 'Syne';">${prop.titre}</h2>
                        <p style="font-size: 1.1rem; color: #BBB; margin-bottom: 2rem; line-height: 1.8;">${prop.description}</p>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 3rem; background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 20px;">
                            <div><span style="color:var(--primary)">📍</span> <strong>Ville:</strong> ${prop.adresse.ville}</div>
                            <div><span style="color:var(--primary)">🏗️</span> <strong>Année:</strong> ${prop.annee_construction}</div>
                            <div><span style="color:var(--primary)">📏</span> <strong>Surface:</strong> ${prop.surface} m²</div>
                            <div><span style="color:var(--primary)">🚪</span> <strong>Pièces:</strong> ${prop.nombre_pieces}</div>
                            <div><span style="color:var(--primary)">🏢</span> <strong>Étage:</strong> ${prop.caracteristiques.etage}</div>
                            <div><span style="color:var(--primary)">📞</span> <strong>Contact:</strong> ${prop.contact}</div>
                        </div>
                        
                        <div class="card-price" style="font-size: 2.5rem; margin-top: auto;">${prop.prix.toLocaleString()} DZD</div>
                    </div>
                </div>
            `;
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('propertyModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        window.addEventListener('scroll', () => {
            const header = document.getElementById('mainHeader');
            if (window.scrollY > 50) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
        });

        initApp();
    </script>
</body>
</html>
